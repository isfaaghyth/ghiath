# Ghiath - Personal Agentic Ecosystem
#
# Local-first stack. Bring it up with:
#   docker compose up -d
#
# Two services are gated behind compose profiles and are NOT started by the
# plain `up` command:
#   caddy  ("prod")   reverse proxy + HTTPS, VPS only:
#                       docker compose --profile prod up -d
#   n8n    ("addon")  optional automation canvas, nothing depends on it:
#                       docker compose --profile addon up -d
#
# hermes-agent is intentionally NOT in this file. It runs on the host via
# `hermes gateway start` per profile. See README section "Hermes profiles".

services:
  # ---------------------------------------------------------------------------
  # CouchDB - backend for the Obsidian "Self-hosted LiveSync" community plugin.
  # You still have to install that plugin in Obsidian (desktop AND mobile) and
  # point it at this instance. See README "Obsidian Live Sync".
  # ---------------------------------------------------------------------------
  couchdb:
    image: couchdb:3
    container_name: ghiath-couchdb
    restart: unless-stopped
    environment:
      COUCHDB_USER: ${COUCHDB_USER}
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD}
    ports:
      # Loopback-only: reachable on localhost (dev) or via SSH tunnel (VPS).
      # In prod, Caddy proxies it over the compose network at couch.ghiath.id.
      - "127.0.0.1:5984:5984"
    volumes:
      - ./couchdb:/opt/couchdb/data

  # ---------------------------------------------------------------------------
  # livesync-bridge - the missing link between the vault ON DISK and CouchDB.
  #
  # Self-hosted LiveSync is an Obsidian plugin: it syncs Obsidian clients to
  # CouchDB, storing notes as chunked documents, not as .md files. There is no
  # Obsidian on this host, so without this bridge the agents' notes (plain files
  # in the vault) and your devices (talking to CouchDB) would never meet.
  #
  # It replicates a filesystem peer and a couchdb peer that share a "group".
  # Its config holds the CouchDB password, so it is generated, never committed:
  #   ./scripts/sync-env.sh --write
  #
  # Pinned to a commit: upstream publishes no image and cuts no tags.
  # ---------------------------------------------------------------------------
  livesync-bridge:
    build:
      context: "https://github.com/vrtmrz/livesync-bridge.git#f27f78cc09b4dcfdceb952f6a222c82d51fee31f"
      # Upstream's Dockerfile with the error handling inverted.
      #
      # The project runs Deno in "byonm" mode, so npm packages are resolved from a
      # real node_modules/ that `deno install` populates. Upstream writes that step
      # as `deno install || true`, which hides a failed install; the build then dies
      # one line later at `deno cache` with the misleading
      #   could not find a matching package for "npm:octagonal-wheels"
      # when the true cause is that the builder could not reach the npm registry.
      #
      # Both steps are load-bearing, and they pull from different places:
      # `deno install` fetches the npm packages into node_modules/, while
      # `deno cache` fetches the JSR ones (@std/*) into DENO_DIR. Letting the
      # cache step fail produces an image with no JSR deps, which then tries to
      # reach jsr.io on every start and crash-loops when it cannot. Fail here,
      # in the build, where the error is visible.
      #
      # DENO_DIR is pinned so the cache the build writes is the one the CMD reads.
      #
      # jsr.io is behind Cloudflare, which blocks the VPS's datacenter IP range
      # (npm is fine, so the build gets far enough to be misleading). Build this
      # image on a machine that can reach JSR and ship it over; see DEPLOY.md.
      dockerfile_inline: |
        FROM docker.io/denoland/deno:2.6.9
        ENV DENO_DIR=/deno-dir
        WORKDIR /app
        COPY --chown=deno:deno . .
        RUN deno install
        RUN test -d node_modules/octagonal-wheels \
            || (echo "ERROR: deno install produced no node_modules - the builder cannot reach the npm registry" && exit 1)
        RUN deno cache main.ts
        CMD ["deno", "task", "run"]
    container_name: ghiath-livesync-bridge
    restart: unless-stopped
    depends_on:
      - couchdb
    volumes:
      - ./livesync-bridge/config.json:/app/dat/config.json:ro
      # Storage peers must live under data/ for the bridge to mount them. These
      # are read/write: the whole point is that it writes your devices' notes
      # back down to the disk the agents read.
      - ./${WORK_VAULT:-vault-work}:/app/data/${WORK_VAULT:-vault-work}
      - ./${HOME_VAULT:-vault-home}:/app/data/${HOME_VAULT:-vault-home}

  # ---------------------------------------------------------------------------
  # ntfy - self-hosted push server for urgent reminder alarms on the phone.
  #
  # scripts/hermes-cron/reminder-tick.py publishes here (on the host loopback,
  # 127.0.0.1:8080) when a vault reminder note comes due; the ntfy phone app,
  # subscribed to the topic over https://ntfy.ghiath.id, rings until the
  # acknowledge window elapses. Config + auth model live in ./ntfy/server.yml.
  # In prod Caddy proxies it at ntfy.ghiath.id (see caddy/Caddyfile).
  # ---------------------------------------------------------------------------
  ntfy:
    image: binwiederhier/ntfy:latest
    container_name: ghiath-ntfy
    command: ["serve"]
    restart: unless-stopped
    environment:
      TZ: ${GENERIC_TIMEZONE:-Asia/Jakarta}
      # Public URL of this ntfy instance. Domain-specific, so it lives in .env
      # rather than server.yml. ntfy reads NTFY_BASE_URL natively. Locally it
      # defaults to the loopback port this container publishes.
      NTFY_BASE_URL: ${NTFY_BASE_URL:-http://localhost:8080}
    ports:
      # Loopback-only for local testing; public access is via Caddy in prod.
      - "127.0.0.1:8080:80"
    volumes:
      - ./ntfy/server.yml:/etc/ntfy/server.yml:ro
      - ./ntfy/data:/var/lib/ntfy

  # ---------------------------------------------------------------------------
  # Qdrant - vector DB / semantic search layer over the vault.
  # 6333 = REST + web dashboard (http://localhost:6333/dashboard), 6334 = gRPC.
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant
    container_name: ghiath-qdrant
    restart: unless-stopped
    ports:
      # Loopback-only. Qdrant has no auth; never expose it publicly. On the VPS
      # reach the dashboard via: ssh -L 6333:localhost:6333 user@vps
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - ./qdrant:/qdrant/storage

  # ---------------------------------------------------------------------------
  # Qdrant indexer (work) - the vault watcher sidecar.
  # A small Python polling script: walks the work vault, chunks changed .md
  # files, embeds them locally with fastembed (no external API needed), and
  # upserts into Qdrant. Deliberately simple; see qdrant-indexer/indexer.py.
  #
  # The vault folder and collection are configurable in agents.conf. Run
  # ./scripts/sync-env.sh --write after changing them, which projects them into
  # .env where compose can read them.
  # ---------------------------------------------------------------------------
  qdrant-indexer:
    build: ./qdrant-indexer
    container_name: ghiath-qdrant-indexer
    restart: unless-stopped
    depends_on:
      - qdrant
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${WORK_COLLECTION:-vault_work}
      VAULT_PATH: /vault
      POLL_INTERVAL_SECONDS: "30"
    volumes:
      - ./${WORK_VAULT:-vault-work}:/vault:ro

  # ---------------------------------------------------------------------------
  # Qdrant indexer (home) - the SAME image, pointed at the home vault.
  # Full isolation from the work vault: it only mounts the home vault folder and
  # writes to a separate Qdrant collection. It physically cannot see the work
  # vault (never mounted here) and search cannot cross, because the collections
  # are distinct. That separation is the point - the household bot must never be
  # able to surface a work note.
  # ---------------------------------------------------------------------------
  qdrant-indexer-home:
    build: ./qdrant-indexer
    container_name: ghiath-qdrant-indexer-home
    restart: unless-stopped
    depends_on:
      - qdrant
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${HOME_COLLECTION:-vault_home}
      VAULT_PATH: /vault
      POLL_INTERVAL_SECONDS: "30"
    volumes:
      - ./${HOME_VAULT:-vault-home}:/vault:ro

  # ---------------------------------------------------------------------------
  # KeiRouter - self-hosted LLM gateway (cost / key management).
  # Docker mode serves both the API and the dashboard on 20180.
  # Default dashboard login password is "keirouter" - change it on first login.
  # If you ever want to skip this and have agents call providers directly,
  # comment this service out and set ANTHROPIC_API_KEY / OPENROUTER_API_KEY on
  # the hermes profiles instead.
  # ---------------------------------------------------------------------------
  keirouter:
    image: ghcr.io/mydisha/keirouter:latest
    container_name: ghiath-keirouter
    restart: unless-stopped
    ports:
      # Loopback-only. In prod, Caddy proxies it at router.ghiath.id behind
      # basic_auth (on top of KeiRouter's own dashboard login).
      - "127.0.0.1:20180:20180"
    environment:
      KEIROUTER_DATA__DIR: /data
      KEIROUTER_SERVER__HOST: 0.0.0.0
      KEIROUTER_SERVER__PORT: "20180"
      KEIROUTER_SECURITY__MASTER_KEY: ${KEIROUTER_MASTER_KEY}
      KEIROUTER_LOG__FORMAT: json
    volumes:
      - ./keirouter:/data

  # ---------------------------------------------------------------------------
  # n8n - OPTIONAL automation canvas. An add-on, not part of the critical path.
  #
  # It used to be the router and the handoff watcher, back when Ghiath ran a
  # team of agents. With a single agent per side there is nothing to route and
  # nothing to hand off, and reminders now run on hermes's own cron (see
  # scripts/hermes-cron/ and REMINDERS.md). So n8n owns no workflow here
  # anymore; nothing breaks if it never starts.
  #
  # It is kept, behind the "addon" profile, purely as a canvas for whatever you
  # want to wire up later:
  #   docker compose --profile addon up -d
  #
  # Its data dir (./n8n) is untouched either way, so any workflow or credential
  # you already created is still there when you start it again.
  # ---------------------------------------------------------------------------
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: ghiath-n8n
    restart: unless-stopped
    profiles: ["addon"]
    ports:
      # Loopback-only. Public access is via Caddy at n8n.ghiath.id.
      - "127.0.0.1:5678:5678"
    environment:
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_PORT: "5678"
      # Local defaults; override these in .env on the VPS. n8n's own owner
      # account (created on first load) is the primary auth layer - create it
      # immediately after first start.
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678/}
      # true in prod (Caddy serves HTTPS), false for plain-http local dev.
      N8N_SECURE_COOKIE: ${N8N_SECURE_COOKIE:-false}
      N8N_RUNNERS_ENABLED: "true"
      GENERIC_TIMEZONE: Asia/Jakarta
      # Handed through for convenience if you build something here later. None
      # of it is required: no shipped workflow reads these.
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      NTFY_URL: ${NTFY_URL:-http://ntfy:80}
      NTFY_TOPIC: ${NTFY_TOPIC:-ghiath-work-alarm}
      NTFY_HOME_TOPIC: ${NTFY_HOME_TOPIC:-ghiath-home-alarm}
      NTFY_TOKEN: ${NTFY_TOKEN:-}
    # Reach the host-only hermes gateway from inside n8n.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./n8n:/home/node/.n8n
      # Read-only: nothing in n8n owns the vault anymore, and a stray workflow
      # must not be able to write into the agent's memory.
      - ./${WORK_VAULT:-vault-work}:/data/vault:ro

  # ---------------------------------------------------------------------------
  # Caddy - reverse proxy + automatic HTTPS. PROD ONLY.
  # Not started by `docker compose up -d`. On the VPS (after DNS is set):
  #   docker compose --profile prod up -d
  # See caddy/Caddyfile and README section 8.
  # ---------------------------------------------------------------------------
  caddy:
    image: caddy:2
    container_name: ghiath-caddy
    restart: unless-stopped
    profiles: ["prod"]
    ports:
      - "80:80"
      - "443:443"
    # Lets the Caddyfile reach the host-only hermes gateway via
    # host.docker.internal on a Linux VPS (already works on Docker Desktop).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Credentials for the basic_auth wrapper in the Caddyfile. Generate the
      # hash with:  docker run --rm caddy:2 caddy hash-password --plaintext 'yourpass'
      ACME_EMAIL: ${ACME_EMAIL}
      BASIC_AUTH_USER: ${BASIC_AUTH_USER}
      BASIC_AUTH_HASH: ${BASIC_AUTH_HASH}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
